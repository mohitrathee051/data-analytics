<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCQ Practice</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>📚 MCQ Practice</h1>

  <!-- Assignment Selector -->
  <select id="setSelector" onchange="startQuiz()">
    <option value="">Select Assignment</option>
  </select>

  <!-- Mock Test Button -->
  <div class="btn-group">
    <button onclick="startMockTest()">🎯 Mock Test (50 Q)</button>
  </div>

  <!-- Quiz Card -->
  <div class="card">
    <h2 id="question">Select an assignment or start mock test</h2>
    <div id="options"></div>

    <button onclick="nextQuestion()">Next ➡️</button>

    <p id="result"></p>

    <div class="scoreBox">
      Score: <span id="score">0</span>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
