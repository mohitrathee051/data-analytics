<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCQ Practice App</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>📚 MCQ Practice</h1>

  <!-- Assignment Selector -->
  <div class="selector">
    <select id="setSelector" onchange="startQuiz()">
      <option value="">Select Assignment</option>
    </select>
  </div>

  <!-- Quiz Card -->
  <div class="card">

    <h2 id="question">Select an assignment to start</h2>

    <div id="options"></div>

    <button onclick="nextQuestion()">Next ➡️</button>

    <p id="result"></p>

    <div class="scoreBox">
      Score: <span id="score">0</span>/10
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
